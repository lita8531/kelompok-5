<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #b9b9b9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: #9e5959;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        h2 {
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #ea00ff;
            border: none;
            color: rgb(255, 0, 0);
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #ea00ff;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>
    <form action="index.html"></form>
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Passwor" required>
        <button><a href="index.html">Masuk</a></button>
    </form>
</div>
</body>
</html>
